name: hardware_diagnostics
description: A cross-platform mobile hardware diagnostics utility.
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0
  http: ^1.2.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  ed_screen_recorder: ^0.0.15
  shared_preferences: ^2.2.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

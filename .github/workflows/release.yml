name: Build and Release signed APK

on:
  push:
    tags:
      - 'v*' # Triggers on tag pushes like v1.0.0, v2.0.1, etc.

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java Environment
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Install Dependencies
      - name: Get Dependencies
        run: flutter pub get

      # 5. Setup Android Signing Keystore
      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          python3 -c "
          import os, base64
          b64 = os.environ.get('KEYSTORE_BASE64', '').strip()
          if b64:
              try:
                  data = base64.b64decode(b64)
                  if len(data) > 100:
                      with open('android/app/upload-keystore.jks', 'wb') as f:
                          f.write(data)
                      print('Decoded secret keystore successfully.')
              except Exception as e:
                  print(f'Failed decoding secret: {e}')
          "
          if [ ! -f android/app/upload-keystore.jks ]; then
              echo "Keystore secret missing or invalid. Auto-generating valid release JKS keystore..."
              keytool -genkeypair -v -keystore android/app/upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -storepass "diagnostics-keystore-pass-2026" -keypass "diagnostics-keystore-pass-2026" -dname "CN=Hardware Diagnostics, OU=Development, O=OpenSource, L=City, S=State, C=US" -storetype JKS
          fi

      # 6. Build Signed APKs (Fat/Universal APK + Split APKs)
      - name: Build Flutter APK
        env:
          KEYSTORE_PATH: "upload-keystore.jks"
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'diagnostics-keystore-pass-2026' }}
          ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || 'release' }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'diagnostics-keystore-pass-2026' }}
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      # 7. Clean up Keystore (Security best practice)
      - name: Clean up Keystore
        run: rm -f android/app/upload-keystore.jks

      # 8. Create GitHub Release and Upload Artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

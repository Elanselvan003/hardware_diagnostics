plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.0'
}

android {
    namespace "com.example.hardware_diagnostics"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.example.hardware_diagnostics"
        minSdk 21
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            // Check for GitHub Actions environment variables first, then fallback to local key.properties
            def keystorePath = System.getenv("KEYSTORE_PATH") ?: ""
            def keystorePassword = System.getenv("STORE_PASSWORD") ?: ""
            def keyAlias = System.getenv("ALIAS") ?: ""
            def keyPassword = System.getenv("KEY_PASSWORD") ?: ""

            if (keystorePath.isEmpty()) {
                def keyPropertiesFile = rootProject.file('key.properties')
                if (keyPropertiesFile.exists()) {
                    def keyProperties = new Properties()
                    keyProperties.load(new FileInputStream(keyPropertiesFile))
                    storeFile = keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
                    storePassword = keyProperties['storePassword']
                    keyAlias = keyProperties['keyAlias']
                    keyPassword = keyProperties['keyPassword']
                }
            } else {
                storeFile = file(keystorePath)
                storePassword = keystorePassword
                this.keyAlias = keyAlias
                this.keyPassword = keyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}
